<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Hetzner Traffic Guard</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body data-theme="dark">
  <header class="topbar">
    <div>
      <h1>Hetzner Traffic Guard</h1>
      <p class="sub">服务器流量监控 · 安全模式优先</p>
    </div>
    <div class="actions">
      <button id="themeBtn" onclick="toggleTheme()">☀️ 浅色</button>
      <input id="kw" placeholder="搜索服务器名/IP" />
      <button onclick="openCreateModal()">+ 创建服务器</button>
      <button onclick="openSnapshotsModal()">快照管理</button>
      <button onclick="loadData()">刷新</button>
    </div>
  </header>

  <section class="cards" id="cards"></section>

  <section class="panel">
    <div class="panel-title">每日流量统计（最近7天）</div>
    <div id="dailyStats" class="daily-stats">加载中...</div>
  </section>

  <section class="panel" style="margin-top:12px">
    <div class="panel-title">服务器列表</div>
    <table id="tb">
      <thead>
      <tr>
        <th>ID</th><th>名称</th><th>IP</th><th>状态</th><th>已用流量</th><th>24h流量</th><th>限额</th><th>占比</th><th>操作</th>
      </tr>
      </thead>
      <tbody></tbody>
    </table>
  </section>

  <div id="createModal" class="modal hidden">
    <div class="modal-card">
      <h3>创建新服务器</h3>
      <div class="grid">
        <label>名称<input id="c_name" placeholder="my-server" /></label>
        <label>机房<select id="c_location"></select></label>
        <label>最少CPU核心<select id="f_cores"><option value="">不限</option><option>2</option><option>4</option><option>8</option><option>16</option></select></label>
        <label>最少内存GB<select id="f_mem"><option value="">不限</option><option>2</option><option>4</option><option>8</option><option>16</option><option>32</option></select></label>
        <label>系列<select id="f_family"><option value="">全部系列</option></select></label>
        <label>型号<select id="c_type"></select><small id="typePrice"></small><small id="typeStock"></small></label>
        <label>镜像/快照<select id="c_image"></select><small id="costEst"></small></label>
      </div>
      <div class="modal-actions" style="margin-top:8px">
        <button class="ghost" onclick="preset('basic')">入门推荐</button>
        <button class="ghost" onclick="preset('balanced')">均衡推荐</button>
        <button class="ghost" onclick="preset('pro')">高配推荐</button>
        <button class="ghost" onclick="refreshInventory()">刷新库存</button>
      </div>
      <div class="modal-actions">
        <button onclick="submitCreate()">创建</button>
        <button class="ghost" onclick="closeCreateModal()">取消</button>
      </div>
    </div>
  </div>

  <div id="snapshotsModal" class="modal hidden">
    <div class="modal-card">
      <h3>快照管理</h3>
      <div id="snapshotsList">加载中...</div>
      <div class="modal-actions">
        <button class="ghost" onclick="closeSnapshotsModal()">关闭</button>
      </div>
    </div>
  </div>

  <script src="/static/app.js"></script>
</body>
</html>
